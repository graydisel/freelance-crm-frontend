<main class="crm-dashboard">
  <app-sidebar></app-sidebar>
  <div class="crm-projects">
    <div class="crm-projects__header">
      <div>
        <h1 class="crm-projects__title">Projects</h1>
        <p class="crm-projects__subtitle">Manage your client projects</p>
      </div>

      <div class="crm-projects__view-toggler">
        <button type="button"
                class="crm-projects__toggler-btn"
                [class.crm-projects__toggler-btn--active]="viewMode() === 'grid'"
                (click)="setViewMode('grid')" title="Grid View">
          Grid
        </button>
        <button type="button"
                class="crm-projects__toggler-btn"
                [class.crm-projects__toggler-btn--active]="viewMode() === 'table'"
                (click)="setViewMode('table')" title="Table View">
          Table
        </button>
      </div>
    </div>

    <app-project-filters
      [totalSearchCount]="filteredTotalCount()"
      [planningCount]="filteredPlanningCount()"
      [activeCount]="filteredActiveCount()"
      [reviewCount]="filteredReviewCount()"
      [completedCount]="filteredCompletedCount()"
      [pausedCount]="filteredPausedCount()"
      (searchChange)="onSearchChange($event)"
      (statusChange)="onStatusChange($event)">
    </app-project-filters>

    @if (viewMode() === 'grid') {
      <div class="crm-projects__grid">
        @for (project of paginatedProjects(); track project.id) {
          <app-project-card [project]="project"></app-project-card>
        } @empty {
          <div class="crm-projects__empty">
            No projects found matching your criteria.
          </div>
        }
      </div>
    } @else {
      <app-project-table [projects]="paginatedProjects()"></app-project-table>
    }
    @if (totalItems() > 0) {
      <div class="crm-projects__pagination">
        <crm-pagination
          [currentPage]="currentPage()"
          [pageSize]="pageSize()"
          [totalItems]="totalItems()"
          (pageChange)="onPageChange($event)">
        </crm-pagination>
      </div>
    }
  </div>
</main>
