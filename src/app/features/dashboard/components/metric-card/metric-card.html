<article class="crm-dashboard__metric-card">
  <div class="crm-dashboard__metric-header">
    <p class="crm-dashboard__metric-label">{{ label() }}</p>
    @if (isLive()) {
      <span class="crm-badge crm-badge--live">Live</span>
    }
  </div>

  <p class="crm-dashboard__metric-value">
    {{ value() }}
    @if (total()) {
      <span class="crm-dashboard__metric-total"> / {{ total() }}</span>
    }
  </p>

  <div class="crm-dashboard__metric-content">
    <ng-content></ng-content>
  </div>

  @if (hint()) {
    <p class="crm-dashboard__metric-hint">{{ hint() }}</p>
  }
</article>
