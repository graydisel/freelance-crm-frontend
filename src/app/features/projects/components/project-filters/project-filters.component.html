<div class="crm-filters" [formGroup]="searchForm">
  <crm-search-input
    formControlName="text"
    placeholder="Search by project title..."
    labelKey="name"
    [searchFn]="projectSearchFn"
    (enterPressed)="search()">
  </crm-search-input>

  <div class="crm-filters__actions">
    <div class="crm-filters__status-dropdown">
      <select formControlName="status" class="crm-filters__select">
        <option value="all">All Statuses</option>
        <option [value]="ProjectStatusEnum.PLANNING">Planning</option>
        <option [value]="ProjectStatusEnum.ACTIVE">Active</option>
        <option [value]="ProjectStatusEnum.REVIEW">Review</option>
        <option [value]="ProjectStatusEnum.COMPLETED">Completed</option>
        <option [value]="ProjectStatusEnum.PAUSED">Paused</option>
      </select>
    </div>

    <div class="crm-filters__results">
      {{ totalSearchCount() }} results found
    </div>

    <button crm-btn type="button" variant="primary" size="md" [loading]="isLoading()" (click)="search()" title="Search">
      Search
    </button>
  </div>
</div>

<crm-filter-chips
  [items]="projectFilterChips()"
  [currentStatus]="currentStatus()"
  (statusChange)="onStatusChange($event)">
</crm-filter-chips>
