<div class="crm-not-found">
  <div class="crm-not-found__panel">
    <div class="crm-not-found__hero">
      <p class="crm-not-found__code" aria-hidden="true">404</p>
      <p class="crm-not-found__label">Page Not Found</p>
    </div>

    <div class="crm-not-found__content">
      <h2 class="crm-not-found__title">Oops! Lost in Space?</h2>
      <p class="crm-not-found__description">
        The page you are looking for doesn't exist or has been moved to another workspace.
      </p>
    </div>

    <div class="crm-not-found__actions">
      <button type="button" class="crm-btn crm-btn--primary" (click)="goHome()">
        Go to Workspace
      </button>
      <button type="button" class="crm-btn crm-btn--secondary" (click)="goBack()">
        Go Back
      </button>
    </div>
  </div>
</div>
