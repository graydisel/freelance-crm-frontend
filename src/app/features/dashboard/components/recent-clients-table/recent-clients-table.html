<div class="crm-dashboard__panel">
  <div class="crm-dashboard__panel-header">
    <h3 class="crm-dashboard__panel-title">Recent Active Clients</h3>
    <p class="crm-dashboard__panel-subtitle">Latest B2B accounts and contract values</p>
  </div>
  <crm-table>

    <tr crm-table-header>
      <th scope="col">Company Name</th>
      <th scope="col">Contract Value</th>
      <th scope="col">Phone</th>
      <th scope="col">Status</th>
    </tr>

    <ng-container crm-table-body>
      @for (client of clients(); track client.companyName) {
        <tr>
          <td>
            <p class="crm-dashboard__company-name">{{ client.companyName }}</p>
          </td>
          <td class="crm-dashboard__cell-value">
            {{ client.contractValue | currency: 'USD' : 'symbol' : '1.0-0' }}
          </td>
          <td class="crm-dashboard__cell-muted">{{ client.phone }}</td>
          <td>
            <crm-status-badge [status]="client.status"></crm-status-badge>
          </td>
        </tr>
      }
    </ng-container>

  </crm-table>
</div>
