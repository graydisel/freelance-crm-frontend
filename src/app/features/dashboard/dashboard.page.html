<div class="crm-dashboard">
  <app-sidebar></app-sidebar>

  <main class="crm-dashboard__main">
    <div class="crm-dashboard__container">

      <header class="crm-dashboard__header">
        <div class="crm-dashboard__header-text">
          <h2 class="crm-dashboard__title">Dashboard</h2>
          <p class="crm-dashboard__summary">{{ summaryText() }}</p>
        </div>
        <button crm-btn type="button" variant="primary" size="md" (click)="refreshData()" [loading]="isRefreshing()">
          {{ isRefreshing() ? 'Refreshing…' : 'Refresh data' }}
        </button>
      </header>

      <section class="crm-dashboard__metrics" aria-label="Key metrics">

        <crm-metric-card label="Active Clients" [value]="metrics().activeClientsCount" [isLive]="true"
          hint="active companies">
        </crm-metric-card>

        <crm-metric-card label="Total Active Revenue"
          [value]="metrics().totalRevenue | currency: 'USD' : 'symbol' : '1.0-0'" hint="across active contracts">
        </crm-metric-card>

        <crm-metric-card label="Projects Pipeline">
          <p class="crm-dashboard__pipeline">
            <span class="crm-dashboard__pipeline-segment--planning">{{ metrics().projectsPlanning }} Planning</span>
            <span class="crm-dashboard__pipeline-divider">/</span>
            <span class="crm-dashboard__pipeline-segment--active">{{ metrics().projectsActive }} Active</span>
            <span class="crm-dashboard__pipeline-divider">/</span>
            <span class="crm-dashboard__pipeline-segment--done">{{ metrics().projectsDone }} Done</span>
          </p>
        </crm-metric-card>

        <crm-metric-card label="Tasks Overview">
          <div class="crm-dashboard__progress">
            <div class="crm-dashboard__progress-meta">
              <span>Completion</span>
              <span class="crm-dashboard__progress-percent">{{ tasksProgress() | percent: '1.0-0' }}</span>
            </div>
            <div class="crm-dashboard__progress-track">
              <div class="crm-dashboard__progress-fill" [style.width.%]="tasksProgress() * 100"></div>
            </div>
          </div>
        </crm-metric-card>

      </section>

      <section class="crm-dashboard__split">
        <div class="crm-dashboard__clients-section">
          <app-recent-clients-table [clients]="metrics().recentClients" />
        </div>

        <div class="crm-dashboard__projects-section">
          <app-project-progress-list [projects]="metrics().topProjects" />
        </div>
      </section>

    </div>
  </main>
</div>
