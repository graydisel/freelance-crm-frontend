<div class="crm-filters" [formGroup]="searchForm">
  <crm-search-input formControlName="text" (enterPressed)="search()">
  </crm-search-input>

  <div class="crm-filters__actions">
    <div class="crm-filters__status-dropdown">
      <select formControlName="status" class="crm-filters__select">
        <option value="all">All Statuses</option>
        <option [value]="ClientStatusEnum.ACTIVE">Active</option>
        <option [value]="ClientStatusEnum.LEAD">Lead</option>
        <option [value]="ClientStatusEnum.ARCHIVED">Archived</option>
      </select>
    </div>

    <div class="crm-filters__results">
      {{ totalResults() }} results found
    </div>

    <button crm-btn type="button" variant="primary" size="md" [loading]="isLoading()" (click)="search()" title="Search">
      Search
    </button>
  </div>
</div>

<div class="crm-filters__chips">
  <button type="button" class="crm-filters__chip" [class.crm-filters__chip--active]="currentStatus() === 'all'"
    (click)="onStatusChange('all')">
    All <span class="crm-filters__badge">{{ totalResults() }}</span>
  </button>

  <button type="button" class="crm-filters__chip"
    [class.crm-filters__chip--active]="currentStatus() === ClientStatusEnum.ACTIVE"
    (click)="onStatusChange(ClientStatusEnum.ACTIVE)">
    Active <span class="crm-filters__badge">{{ activeCount() }}</span>
  </button>

  <button type="button" class="crm-filters__chip"
    [class.crm-filters__chip--active]="currentStatus() === ClientStatusEnum.LEAD"
    (click)="onStatusChange(ClientStatusEnum.LEAD)">
    Lead <span class="crm-filters__badge">{{ leadsCount() }}</span>
  </button>

  <button type="button" class="crm-filters__chip"
    [class.crm-filters__chip--active]="currentStatus() === ClientStatusEnum.ARCHIVED"
    (click)="onStatusChange(ClientStatusEnum.ARCHIVED)">
    Archived <span class="crm-filters__badge">{{ archivedCount() }}</span>
  </button>
</div>
